{%extends 'index.html'%}

{%block content%}

    <div class="row g-4">
        <div class="col-sm-6 col-xl-3">
            <div class="bg-light rounded d-flex align-items-center justify-content-between p-4">
                <i class="fa fa-chart-line fa-3x text-success"></i>
                <div class="ms-3">
                    <p class="mb-2">Accuracy</p>
                    <h6 class="mb-0">99.99%</h6>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">

                <i class="fa fa-chart-bar fa-3x text-success"></i>
                <div class="ms-3">
                    <p class="mb-2">Total Predictions</p>
                    <h6 class="mb-0">{{prediction}}</h6>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="bg-light rounded d-flex align-items-center justify-content-between p-4">
                <i class="fa fa-chart-area fa-3x text-success"></i>
                <div class="ms-3">
                    <p class="mb-2">Reports</p>
                    <h6 class="mb-0">{{report_count}}</h6>
