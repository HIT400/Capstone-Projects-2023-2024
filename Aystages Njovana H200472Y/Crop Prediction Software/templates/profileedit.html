{%extends 'index.html'%}

{%block content%}

<div class="container-fluid">
    <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-6">
            <form action="/edit" method="POST">

                <div class="bg-light rounded p-4 p-sm-5 my-4 mx-3">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <h3>Edit User Role</h3>
                    </div>
                    
                    <input type="hidden" name="id" value="{{user[0]}}">
    
                    <div class="form-floating mb-3">
                        <select class="form-select" id="floatingSelect" name="role" aria-label="Floating label select example" aria-placeholder="{{user[4]}}">
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                        </select>
                        <label for="floatingSelect">Select Role</label>
                    </div>
                    
                   
                    
                    <button type="submit" class="btn btn-success py-3 w-100 mb-4">Update</button>
                    
                </div>

            </form>
            
        </div>
    </div>
</div>

{%endblock%}
<!-- Sign Up End -->
