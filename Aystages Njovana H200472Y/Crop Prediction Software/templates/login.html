<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Agricision</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="{{url_for('static',filename='css2?family=Heebo:wght@400;500;600;700&display=swap')}}" rel="stylesheet">
    
    <!-- Icon Font Stylesheet -->
    <link href="{{url_for('static',filename='ajax/libs/font-awesome/5.10.0/css/all.min.css')}}" rel="stylesheet">
    <link href="{{url_for('static',filename='npm/bootstrap-icons1.4.1/font/bootstrap-icons.css')}}" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="{{url_for('static',filename='lib/owlcarousel/assets/owl.carousel.min.css')}}" rel="stylesheet">
    <link href="{{url_for('static',filename='lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css')}}" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="{{url_for('static',filename='css/bootstrap.min.css')}}" rel="stylesheet">

    <!-- Template Stylesheet -->

<style>
    /* body{
        background-image: url('/static/images/closeup-shot-large-green-corn-field.jpg');
    } */
    #test{
        background-image:  url('/static/images/closeup-shot-large-green-corn-field.jpg');
        background-size:100%;

    }
</style>
<body>
            {% with messages = get_flashed_messages(with_categories=True) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} flash-message">
                        {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
    <div class="container-xxl position-relative bg-white d-flex p-0" id="test">
       


        <!-- Sign In Start -->
        <div class="container-fluid">
            <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
                <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
                    <div class="bg-light rounded p-4 p-sm-5 my-4 mx-3">
                        <div class="text-center mb-3">
                          
                                <h3 class="text-success ">AGRICISION</h3>
                          
                            <!-- <h3>Sign In</h3> -->
                        </div>
                        <form action="/login-user" method="POST">

                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" name="email" id="floatingInput" placeholder="name@example.com">
                                <label for="floatingInput">Email address</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" name="password" id="floatingPassword" placeholder="Password">
                                <label for="floatingPassword">Password</label>
                            </div>
                            <!-- <div class="d-flex align-items-center justify-content-between mb-4">
                                <div class="form-check">
                                    <input type="checkbox" name="remember" id="remember" class="form-check-input" id="exampleCheck1">
                                    <label class="form-check-label" for="exampleCheck1">Remember me</label>
                                </div>
                                <!-- <a href="" class="text-success">Forgot Password</a> 
                            </div> -->
                            <button type="submit" class="btn btn-success py-3 w-100 mb-4">Sign In</button>

                        </form>
                        
                        <!-- <p class="text-center mb-0">Don't have an Account? <a href="" class="text-success">Sign Up</a></p> -->
                    </div>
                </div>
            </div>
        </div>
        <!-- Sign In End -->
    </div>

    <!-- JavaScript Libraries -->
    <script>
        // Function to hide flash messages after a certain time period
        setTimeout(function() {
            var flashMessages = document.querySelectorAll('.flash-message');
            flashMessages.forEach(function(message) {
                message.style.display = 'none';
            });
        }, 5000); // Adjust the time period (in milliseconds) as needed
    </script>
    <script src="{{url_for('static',filename='js/jquery-3.4.1.min.js')}}"></script>
    <script src="{{url_for('static',filename='npm/bootstrap5.0.0/dist/js/bootstrap.bundle.min.js')}}"></script>
    <script src="{{url_for('static',filename='lib/chart/chart.min.js')}}"></script>
    <script src="{{url_for('static',filename='lib/easing/easing.min.js')}}"></script>
    <script src="{{url_for('static',filename='lib/waypoints/waypoints.min.js')}}"></script>
    <script src="{{url_for('static',filename='lib/owlcarousel/owl.carousel.min.js')}}"></script>
    <script src="{{url_for('static',filename='lib/tempusdominus/js/moment.min.js')}}"></script>
    <script src="{{url_for('static',filename='lib/tempusdominus/js/moment-timezone.min.js')}}"></script>
    <script src="{{url_for('static',filename='lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js')}}"></script>

    <!-- Template Javascript -->
    <script src="{{url_for('static',filename='js/main.js')}}"></script>
    
</body>
<html></html>
