{%extends 'index.html'%}
<!-- Sale & Revenue Start -->



{%block content%}


<div class="row g-4">
    <div class="col-sm-12 col-xl-6">
        
        <div class="bg-light rounded h-100 p-5">
            <h6 class="mb-4 text-success">Edit user details</h6>
            <form method="POST" action="/update-profile">
                <div class="mb-3">
                    <label for="rainfall" class="form-label">Username</label>
                    <input type="text" class="form-control" id="rainfall" name="username" value="{{user[1]}}">
                </div>
                <div class="mb-3">
                    <label for="temperature" class="form-label">Email</label>
                    <input type="text" class="form-control" id="temperature" name="email" value="{{user[2]}}">
                </div>
                <div class="mb-3">
                    <label for="pesticides" class="form-label">Password</label>
                    <input type="text" class="form-control" id="pesticides" name="password" placeholder="Type new password .....">
                </div>
                <button type="submit" class="btn btn-success">Change</button>
            </form>
            
        </div>
        
    </div>
    <div class="col-sm-12 col-xl-6">
        <div class="bg-light rounded h-100 p-5">
            {% if user %}
            <h6 class="mb-2 text-success">Username</h6>
            <h7 class="fw-light text-secondary">{{ user[1] }}</h3>
            <h6 class="mb-2 mt-4 text-success">Email</h6>
            <h7 class="fw-light text-secondary">{{ user[2]}}</h4>
            <h6 class="mb-2 mt-4  text-success">Role</h6>
            <h7 class="fw-light text-secondary">{{ user[4]}}</h4>
            {% endif %}
        </div>
    </div>
 </div>

 {%endblock%}
